<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>muralisc</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8a96e;
      --hover: #e8e8e8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 3rem;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    h1 span { color: var(--muted); }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
    }

    li a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border: 1px solid #222;
      border-radius: 4px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      transition: border-color 0.15s, color 0.15s;
    }

    li a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    li a .arrow { color: var(--muted); font-size: 0.8rem; }
    li a:hover .arrow { color: var(--accent); }

    footer {
      font-size: 0.65rem;
      color: #2a2a2a;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <h1>muralisc<span>.github.io</span></h1>

  <ul>
    <li>
      <a href="/routineclock/">
        routineclock
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>

  <footer>muralisc</footer>

</body>
</html>
